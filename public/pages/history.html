<div class="flex flex-col gap-5">
  <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 anim">
    <div>
      <h1 class="font-geist text-xl font-semibold text-white">Generation History</h1>
      <p class="text-xs text-zinc-500 mt-0.5">Every resume you have generated, ready to re-download.</p>
    </div>
  </div>
  <div id="historyList" class="flex flex-col gap-3 anim anim-d1"></div>
  <div id="historyEmpty" class="hidden empty-state">
    <div class="empty-icon">
      <iconify-icon icon="solar:history-linear" class="text-zinc-600" style="font-size:24px"></iconify-icon>
    </div>
    <p class="text-sm font-medium text-zinc-300">No resumes generated yet</p>
    <p class="text-xs text-zinc-500">Generate your first tailored resume from the Generate page.</p>
    <button onclick="App.nav('generate')" class="btn-secondary text-xs py-2">
      <iconify-icon icon="solar:magic-stick-3-linear" style="font-size:12px"></iconify-icon>
      Go to Generate
    </button>
  </div>
</div>

<div id="histDetailModal" class="modal-backdrop hidden">
  <div class="modal-box wide" onclick="event.stopPropagation()" style="max-height:90vh;overflow:hidden;display:flex;flex-direction:column;gap:0;padding:0">
    <div class="flex items-center justify-between p-5 border-b border-white/5 flex-shrink-0">
      <div>
        <h3 id="histModalTitle" class="font-geist text-base font-semibold text-white"></h3>
        <p id="histModalMeta" class="text-xs text-zinc-500 mt-0.5"></p>
      </div>
      <button onclick="History.closeModal()" class="text-zinc-500 hover:text-white transition-colors">
        <iconify-icon icon="solar:close-circle-linear" style="font-size:20px"></iconify-icon>
      </button>
    </div>
    <!-- Tabs -->
    <div class="flex border-b border-white/5 flex-shrink-0 px-1">
      <button onclick="History.switchTab('source')" data-htab="source" class="tab active">LaTeX Source</button>
      <button onclick="History.switchTab('preview')" data-htab="preview" class="tab">Preview</button>
    </div>
    <div class="flex-1 overflow-auto scroll" style="min-height:0">
      <div id="histTabSource" class="p-5">
        <pre id="histModalLatex" class="text-xs text-zinc-300 leading-relaxed whitespace-pre-wrap font-mono"></pre>
      </div>
      <div id="histTabPreview" class="hidden bg-white" style="min-height:100%">
        <div id="histLatexPreview" class="latex-resume"></div>
      </div>
    </div>
    <div class="flex items-center justify-end gap-2 p-4 border-t border-white/5 flex-shrink-0">
      <button id="histCopyBtn" class="btn-secondary text-xs py-2">
        <iconify-icon icon="solar:copy-linear" style="font-size:12px"></iconify-icon> Copy LaTeX
      </button>
      <button id="histDownloadBtn" class="btn-secondary text-xs py-2">
        <iconify-icon icon="solar:download-minimalistic-linear" style="font-size:12px"></iconify-icon> Download .TEX
      </button>
      <button id="histDownloadHtmlBtn" class="btn-primary text-xs py-2">
        <iconify-icon icon="solar:download-minimalistic-linear" style="font-size:12px"></iconify-icon> Download .HTML
      </button>
    </div>
  </div>
</div>
