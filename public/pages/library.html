<div class="flex flex-col gap-5">
  <!-- Header -->
  <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 anim">
    <div>
      <h1 class="font-geist text-xl font-semibold text-white">Project Library</h1>
      <p class="text-xs text-zinc-500 mt-0.5">Your GitHub projects and experiences — the raw material for every resume.</p>
    </div>
    <button onclick="Library.openAddModal()" class="btn-primary text-sm flex-shrink-0">
      <iconify-icon icon="solar:add-circle-linear" style="font-size:14px"></iconify-icon>
      Add Manually
    </button>
  </div>

  <!-- Filters -->
  <div class="flex flex-col sm:flex-row gap-3 anim anim-d1">
    <div class="relative flex-1">
      <iconify-icon icon="solar:magnifer-linear" class="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-500 pointer-events-none" style="font-size:14px"></iconify-icon>
      <input id="libSearch" type="text" placeholder="Search projects, tags, content..."
        oninput="Library.filter()"
        class="input pl-9 py-2.5 text-sm">
    </div>
    <select id="libTagFilter" onchange="Library.filter()" class="input py-2.5 text-sm w-full sm:w-44">
      <option value="">All Tags</option>
    </select>
    <select id="libTypeFilter" onchange="Library.filter()" class="input py-2.5 text-sm w-full sm:w-44">
      <option value="">All Types</option>
      <option value="project">Project</option>
      <option value="experience">Experience</option>
      <option value="education">Education</option>
      <option value="skill">Skills</option>
      <option value="certification">Certification</option>
    </select>
  </div>

  <!-- Stats bar -->
  <div id="libStats" class="text-xs text-zinc-500 anim anim-d1"></div>

  <!-- Grid -->
  <div id="libGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 anim anim-d2"></div>

  <!-- Empty state -->
  <div id="libEmpty" class="hidden empty-state">
    <div class="empty-icon">
      <iconify-icon icon="solar:library-linear" class="text-zinc-600" style="font-size:24px"></iconify-icon>
    </div>
    <div>
      <p class="text-sm font-medium text-zinc-300 mb-1">Library is empty</p>
      <p class="text-xs text-zinc-500">Analyze a GitHub repo from the Generate page,<br>or add a project manually.</p>
    </div>
    <button onclick="App.nav('generate')" class="btn-secondary text-xs py-2">
      <iconify-icon icon="solar:code-square-linear" style="font-size:12px"></iconify-icon>
      Analyze a GitHub Repo
    </button>
  </div>
</div>

<!-- Add Modal -->
<div id="addModal" class="modal-backdrop hidden">
  <div class="modal-box wide" onclick="event.stopPropagation()" style="max-height:90vh;overflow-y:auto">
    <div class="flex items-center justify-between mb-4">
      <h3 class="font-geist text-base font-semibold text-white">Add to Library</h3>
      <button onclick="Library.closeAddModal()" class="text-zinc-500 hover:text-white transition-colors">
        <iconify-icon icon="solar:close-circle-linear" style="font-size:20px"></iconify-icon>
      </button>
    </div>
    
    <!-- Type Selector -->
    <div class="flex flex-col gap-1.5 mb-4">
      <label class="text-xs font-medium text-zinc-400">What are you adding? *</label>
      <select id="addType" onchange="Library.updateAddFormFields()" class="input py-2.5 text-sm">
        <option value="project">Project</option>
        <option value="experience">Work Experience</option>
        <option value="education">Education</option>
        <option value="skill">Skills</option>
        <option value="certification">Certification</option>
      </select>
    </div>

    <!-- Dynamic fields based on type -->
    <div id="addDynamicFields" class="flex flex-col gap-4"></div>

    <div id="addAlert" class="alert hidden"></div>
    <div class="flex gap-3 justify-end mt-4">
      <button onclick="Library.closeAddModal()" class="btn-secondary">Cancel</button>
      <button onclick="Library.saveItem()" class="btn-primary">Save to Library</button>
    </div>
  </div>
</div>

<!-- View/Edit Modal -->
<div id="viewModal" class="modal-backdrop hidden">
  <div class="modal-box wide" onclick="event.stopPropagation()" style="max-height:90vh;overflow:hidden;display:flex;flex-direction:column;gap:0;padding:0">
    <!-- Header -->
    <div class="flex items-center justify-between p-5 border-b border-white/5 flex-shrink-0">
      <div class="flex items-center gap-3 min-w-0">
        <h3 id="viewTitle" class="font-geist text-base font-semibold text-white truncate"></h3>
        <span id="viewTypeBadge" class="tag flex-shrink-0"></span>
      </div>
      <button onclick="Library.closeViewModal()" class="text-zinc-500 hover:text-white transition-colors flex-shrink-0 ml-3">
        <iconify-icon icon="solar:close-circle-linear" style="font-size:20px"></iconify-icon>
      </button>
    </div>
    <!-- Tabs -->
    <div class="flex border-b border-white/5 flex-shrink-0 px-1">
      <button onclick="Library.switchViewTab('preview')" data-vtab="preview" class="tab active">Preview</button>
      <button onclick="Library.switchViewTab('raw')" data-vtab="raw" class="tab">Raw Markdown</button>
      <button onclick="Library.switchViewTab('edit')" data-vtab="edit" class="tab">Edit</button>
    </div>
    <!-- Content -->
    <div class="flex-1 overflow-auto scroll p-5" style="min-height:0">
      <div id="viewPreview" class="md"></div>
      <div id="viewRaw" class="hidden">
        <pre id="viewRawContent" class="text-xs text-zinc-300 leading-relaxed whitespace-pre-wrap font-mono"></pre>
      </div>
      <div id="viewEdit" class="hidden flex flex-col gap-3">
        <div class="flex gap-3">
          <div class="flex-1 flex flex-col gap-1.5">
            <label class="text-xs font-medium text-zinc-400">Title</label>
            <input id="editTitle" type="text" class="input py-2 text-sm">
          </div>
          <div class="flex flex-col gap-1.5">
            <label class="text-xs font-medium text-zinc-400">Type</label>
            <select id="editType" onchange="Library.updateEditFormFields()" class="input py-2 text-sm">
              <option value="project">Project</option>
              <option value="experience">Work Experience</option>
              <option value="education">Education</option>
              <option value="skill">Skills</option>
              <option value="certification">Certification</option>
            </select>
          </div>
        </div>
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-medium text-zinc-400">Tags (comma separated)</label>
          <input id="editTags" type="text" class="input py-2 text-sm">
        </div>
        <!-- Dynamic fields for edit -->
        <div id="editDynamicFields"></div>
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-medium text-zinc-400">Content</label>
          <textarea id="editContent" class="input scroll font-mono text-xs" style="min-height:300px"></textarea>
        </div>
        <div id="editAlert" class="alert hidden"></div>
        <button onclick="Library.saveEdit()" class="btn-primary self-end">Save Changes</button>
      </div>
    </div>
    <!-- Footer -->
    <div class="flex items-center justify-between p-4 border-t border-white/5 flex-shrink-0">
      <div id="viewTags" class="flex flex-wrap gap-1.5"></div>
      <div class="flex gap-2">
        <button id="viewDeleteBtn" class="btn-danger text-xs py-1.5 px-3">
          <iconify-icon icon="solar:trash-bin-trash-linear" style="font-size:12px"></iconify-icon> Delete
        </button>
        <button onclick="Library.closeViewModal()" class="btn-secondary text-xs py-1.5 px-3">Close</button>
      </div>
    </div>
  </div>
</div>
