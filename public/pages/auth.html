<div class="min-h-screen flex items-center justify-center px-4 py-16">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex items-center gap-2 mb-4">
        <div class="w-10 h-10 rounded-lg bg-white flex items-center justify-center">
          <iconify-icon icon="solar:document-add-linear" style="font-size:18px;color:#000"></iconify-icon>
        </div>
        <h1 class="text-2xl font-bold text-white">ResumeForge</h1>
      </div>
      <p class="text-zinc-400 text-sm">AI-powered resume generation</p>
    </div>

    <div class="bg-zinc-900/50 border border-white/10 rounded-xl p-8 backdrop-blur-sm">
      <!-- Tab switcher -->
      <div class="flex gap-2 mb-6 p-1 bg-zinc-800/50 rounded-lg">
        <button id="loginTab" onclick="Auth.switchTab('login')" 
          class="flex-1 py-2 px-4 rounded-md text-sm font-medium transition-all auth-tab-active">
          Login
        </button>
        <button id="registerTab" onclick="Auth.switchTab('register')" 
          class="flex-1 py-2 px-4 rounded-md text-sm font-medium transition-all text-zinc-400 hover:text-white">
          Register
        </button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" onsubmit="Auth.handleLogin(event)">
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-zinc-300 mb-2">Email</label>
            <input type="email" id="loginEmail" required
              class="w-full px-4 py-2.5 bg-zinc-800/50 border border-white/10 rounded-lg text-white placeholder-zinc-500 focus:outline-none focus:border-white/20 transition-colors">
          </div>
          <div>
            <label class="block text-sm font-medium text-zinc-300 mb-2">Password</label>
            <input type="password" id="loginPassword" required
              class="w-full px-4 py-2.5 bg-zinc-800/50 border border-white/10 rounded-lg text-white placeholder-zinc-500 focus:outline-none focus:border-white/20 transition-colors">
          </div>
          <div id="loginError" class="hidden text-sm text-red-400 bg-red-500/10 border border-red-500/20 rounded-lg p-3"></div>
          <button type="submit" id="loginBtn"
            class="w-full py-2.5 bg-white text-black font-medium rounded-lg hover:bg-zinc-200 transition-colors">
            Login
          </button>
        </div>
      </form>

      <!-- Register Form -->
      <form id="registerForm" onsubmit="Auth.handleRegister(event)" class="hidden">
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-zinc-300 mb-2">Full Name *</label>
            <input type="text" id="registerName" required placeholder="John Doe"
              class="w-full px-4 py-2.5 bg-zinc-800/50 border border-white/10 rounded-lg text-white placeholder-zinc-500 focus:outline-none focus:border-white/20 transition-colors">
          </div>
          <div>
            <label class="block text-sm font-medium text-zinc-300 mb-2">Email *</label>
            <input type="email" id="registerEmail" required placeholder="john@example.com"
              class="w-full px-4 py-2.5 bg-zinc-800/50 border border-white/10 rounded-lg text-white placeholder-zinc-500 focus:outline-none focus:border-white/20 transition-colors">
          </div>
          <div>
            <label class="block text-sm font-medium text-zinc-300 mb-2">Phone</label>
            <input type="tel" id="registerPhone" placeholder="+1 (555) 123-4567"
              class="w-full px-4 py-2.5 bg-zinc-800/50 border border-white/10 rounded-lg text-white placeholder-zinc-500 focus:outline-none focus:border-white/20 transition-colors">
          </div>
          <div>
            <label class="block text-sm font-medium text-zinc-300 mb-2">LinkedIn URL</label>
            <input type="url" id="registerLinkedIn" placeholder="https://linkedin.com/in/johndoe"
              class="w-full px-4 py-2.5 bg-zinc-800/50 border border-white/10 rounded-lg text-white placeholder-zinc-500 focus:outline-none focus:border-white/20 transition-colors">
          </div>
          <div>
            <label class="block text-sm font-medium text-zinc-300 mb-2">GitHub URL</label>
            <input type="url" id="registerGitHub" placeholder="https://github.com/johndoe"
              class="w-full px-4 py-2.5 bg-zinc-800/50 border border-white/10 rounded-lg text-white placeholder-zinc-500 focus:outline-none focus:border-white/20 transition-colors">
          </div>
          <div>
            <label class="block text-sm font-medium text-zinc-300 mb-2">Password *</label>
            <input type="password" id="registerPassword" required minlength="8" placeholder="••••••••"
              class="w-full px-4 py-2.5 bg-zinc-800/50 border border-white/10 rounded-lg text-white placeholder-zinc-500 focus:outline-none focus:border-white/20 transition-colors">
            <p class="text-xs text-zinc-500 mt-1">Minimum 8 characters</p>
          </div>
          <div id="registerError" class="hidden text-sm text-red-400 bg-red-500/10 border border-red-500/20 rounded-lg p-3"></div>
          <button type="submit" id="registerBtn"
            class="w-full py-2.5 bg-white text-black font-medium rounded-lg hover:bg-zinc-200 transition-colors">
            Create Account
          </button>
        </div>
      </form>
    </div>

    <p class="text-center text-xs text-zinc-500 mt-6">
      Your data is encrypted and stored securely
    </p>
  </div>
</div>
