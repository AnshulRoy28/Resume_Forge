# Render Blueprint for ResumeForge
services:
  - type: web
    name: resumeforge
    env: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run reset-db
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
        sync: false
      - key: PORT
        value: 3000
    healthCheckPath: /
    disk:
      name: resumeforge-data
      mountPath: /app/data
      sizeGB: 1
